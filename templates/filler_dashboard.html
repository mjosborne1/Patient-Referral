<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filler View — Specialist Referrals</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body>
    {% set active_page = 'filler' %}
    {% include 'partials/sidebar.html' %}

    <main class="main-content">
    <div class="container-fluid mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary mb-0">
                <i class="fas fa-hospital-user me-2"></i> Filler View — Incoming Referrals
            </h2>
            <div class="d-flex gap-2">
                <select id="statusFilter" class="form-select form-select-sm" style="width:auto;"
                        onchange="refreshTaskList()">
                    <option value="">All open</option>
                    <option value="requested">Requested</option>
                    <option value="received">Received</option>
                    <option value="accepted">Accepted</option>
                    <option value="in-progress">In progress</option>
                    <option value="on-hold">On hold</option>
                    <option value="completed">Completed</option>
                    <option value="rejected">Rejected</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <button class="btn btn-outline-primary btn-sm"
                        onclick="refreshTaskList()"
                        id="refreshBtn">
                    <i class="fas fa-sync-alt me-1"></i> Refresh
                </button>
            </div>
        </div>

        <div class="row">
            <!-- ── Task list ─────────────────────────────────────── -->
            <div class="col-lg-7 col-xl-8">
                <div class="card">
                    <div class="card-body p-0">
                        <div id="fillerTaskList"
                             hx-get="/filler/tasks"
                             hx-trigger="load"
                             hx-swap="innerHTML">
                            <div class="text-center py-4 text-muted">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                Loading referrals…
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Task detail panel ─────────────────────────────── -->
            <div class="col-lg-5 col-xl-4">
                <div class="card h-100">
                    <div class="card-header bg-light fw-semibold">
                        <i class="fas fa-clipboard-list me-1"></i> Referral Detail
                    </div>
                    <div class="card-body" id="fillerDetail">
                        <div class="text-muted text-center py-5">
                            <i class="fas fa-arrow-left fa-2x mb-3 d-block opacity-25"></i>
                            Select a referral to view details and update status.
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
    </main>

    <script>
    function refreshTaskList() {
        var filter = document.getElementById('statusFilter').value;
        var url = '/filler/tasks' + (filter ? '?status=' + encodeURIComponent(filter) : '');
        htmx.ajax('GET', url, {target: '#fillerTaskList', swap: 'innerHTML'});
    }

    function viewTask(taskId) {
        htmx.ajax('GET', '/filler/task/' + taskId, {target: '#fillerDetail', swap: 'innerHTML'});
        // Highlight selected row
        document.querySelectorAll('.filler-task-row').forEach(function(r) {
            r.classList.remove('table-active');
        });
        var row = document.getElementById('task-row-' + taskId);
        if (row) row.classList.add('table-active');
    }

    function updateStatus(taskId, newStatus) {
        var statusReason = '';
        if (newStatus === 'rejected' || newStatus === 'cancelled') {
            statusReason = prompt('Reason for ' + newStatus + ' (required):');
            if (!statusReason) return;
        }
        htmx.ajax('POST', '/filler/task/' + taskId + '/status', {
            target: '#fillerTaskList',
            swap: 'innerHTML',
            values: {status: newStatus, status_reason: statusReason}
        }).then(function() {
            // Reload detail panel too
            htmx.ajax('GET', '/filler/task/' + taskId, {target: '#fillerDetail', swap: 'innerHTML'});
        });
    }
    </script>
</body>
</html>
