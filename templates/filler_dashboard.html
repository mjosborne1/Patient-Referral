<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filler View — Specialist Referrals</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body>
    {% set active_page = 'filler' %}
    {% include 'partials/sidebar.html' %}

    <main class="main-content">
    <div class="container-fluid mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary mb-0">
                <i class="fas fa-hospital-user me-2"></i>
                Specialist Referrals &mdash; <span id="inboxStatusLabel">All Open</span>
            </h2>
            <div class="d-flex gap-2">
                <select id="statusFilter" class="form-select form-select-sm" style="width:auto;"
                        onchange="refreshTaskList()">
                    <option value="">All Open</option>
                    <option value="requested">Requested</option>
                    <option value="received">Received</option>
                    <option value="accepted">Accepted</option>
                    <option value="in-progress">In Progress</option>
                    <option value="on-hold">On Hold</option>
                    <option value="completed">Completed</option>
                    <option value="rejected">Rejected</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                <button class="btn btn-outline-primary btn-sm"
                        onclick="refreshTaskList()"
                        id="refreshBtn">
                    <i class="fas fa-sync-alt me-1"></i> Refresh
                </button>
            </div>
        </div>

        <div class="row">
            <!-- ── Task list ─────────────────────────────────────── -->
            <div class="col-lg-7 col-xl-8">
                <div class="card">
                    <div class="card-body p-0">
                        <div id="fillerTaskList">
                            <div class="text-center py-4 text-muted">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                Loading referrals…
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Task detail panel ─────────────────────────────── -->
            <div class="col-lg-5 col-xl-4">
                <div class="card h-100">
                    <div class="card-header bg-light fw-semibold">
                        <i class="fas fa-clipboard-list me-1"></i> Referral Detail
                    </div>
                    <div class="card-body" id="fillerDetail">
                        <div class="text-muted text-center py-5">
                            <i class="fas fa-arrow-left fa-2x mb-3 d-block opacity-25"></i>
                            Select a referral to view details and update status.
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
    </main>

    <script>
    // Inject FHIR server URL and auth headers on every HTMX request,
    // matching the pattern used by index.html so the filler routes
    // hit the same server the user configured in Settings.
    document.body.addEventListener('htmx:configRequest', function(evt) {
        var fhirServerUrl = localStorage.getItem('fhir_server_url');
        if (fhirServerUrl) evt.detail.headers['X-FHIR-Server-URL'] = fhirServerUrl;

        var authMode = localStorage.getItem('fhirAuthMode') || 'none';
        if (authMode === 'basic') {
            var username = localStorage.getItem('fhirUsername');
            var password = localStorage.getItem('fhirPassword');
            if (username && password) {
                evt.detail.headers['X-FHIR-Username'] = username;
                evt.detail.headers['X-FHIR-Password'] = password;
            }
        } else if (authMode === 'smart') {
            var token = localStorage.getItem('smart_access_token');
            if (token) evt.detail.headers['X-FHIR-Bearer-Token'] = token;
        }
        // Legacy basic-auth fallback
        if (!localStorage.getItem('fhirAuthMode') && localStorage.getItem('useFhirAuth') === 'true') {
            var u = localStorage.getItem('fhirUsername');
            var p = localStorage.getItem('fhirPassword');
            if (u && p) { evt.detail.headers['X-FHIR-Username'] = u; evt.detail.headers['X-FHIR-Password'] = p; }
        }
    });

    function _fillerHeaders(contentType) {
        var h = {};
        if (contentType) h['Content-Type'] = contentType;
        var fhirServerUrl = localStorage.getItem('fhir_server_url');
        if (fhirServerUrl) h['X-FHIR-Server-URL'] = fhirServerUrl;
        var authMode = localStorage.getItem('fhirAuthMode') || 'none';
        if (authMode === 'basic') {
            var u = localStorage.getItem('fhirUsername');
            var p = localStorage.getItem('fhirPassword');
            if (u && p) { h['X-FHIR-Username'] = u; h['X-FHIR-Password'] = p; }
        } else if (authMode === 'smart') {
            var token = localStorage.getItem('smart_access_token');
            if (token) h['X-FHIR-Bearer-Token'] = token;
        }
        if (!localStorage.getItem('fhirAuthMode') && localStorage.getItem('useFhirAuth') === 'true') {
            var u2 = localStorage.getItem('fhirUsername');
            var p2 = localStorage.getItem('fhirPassword');
            if (u2 && p2) { h['X-FHIR-Username'] = u2; h['X-FHIR-Password'] = p2; }
        }
        return h;
    }

    function initTooltips(container) {
        (container || document.body).querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function(el) {
            var parts = [];
            var name = el.getAttribute('data-pt-name');
            var dob  = el.getAttribute('data-pt-dob');
            var addr = el.getAttribute('data-pt-address');
            var phone = el.getAttribute('data-pt-phone');
            if (name)  parts.push('<strong>' + name.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</strong>');
            if (dob)   parts.push('<small class="text-white-50">DOB: ' + dob + '</small>');
            if (addr)  parts.push('<small class="text-white-50">' + addr.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</small>');
            if (phone) parts.push('<small class="text-white-50">' + phone.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</small>');
            if (parts.length) {
                el.setAttribute('data-bs-title', parts.join('<br>'));
            }
            bootstrap.Tooltip.getOrCreateInstance(el, {html: true});
        });
    }

    function refreshTaskList() {
        var sel = document.getElementById('statusFilter');
        var filter = sel ? sel.value : '';
        var label = sel ? sel.options[sel.selectedIndex].text : 'All Open';
        var labelEl = document.getElementById('inboxStatusLabel');
        if (labelEl) labelEl.textContent = label;
        var url = '/filler/tasks' + (filter ? '?status=' + encodeURIComponent(filter) : '');
        fetch(url, {headers: _fillerHeaders()})
            .then(function(resp) { return resp.text(); })
            .then(function(html) {
                var el = document.getElementById('fillerTaskList');
                if (el) { el.innerHTML = html; htmx.process(el); initTooltips(el); }
            });
    }

    function viewTask(taskId) {
        fetch('/filler/task/' + taskId, {headers: _fillerHeaders()})
            .then(function(resp) { return resp.text(); })
            .then(function(html) {
                var el = document.getElementById('fillerDetail');
                if (el) { el.innerHTML = html; htmx.process(el); }
            });
        document.querySelectorAll('.filler-task-row').forEach(function(r) {
            r.classList.remove('table-active');
        });
        var row = document.getElementById('task-row-' + taskId);
        if (row) row.classList.add('table-active');
    }

    function updateStatus(taskId, newStatus) {
        var statusReason = '';
        if (newStatus === 'rejected' || newStatus === 'cancelled') {
            statusReason = prompt('Reason for ' + newStatus + ' (required):');
            if (!statusReason) return;
        }
        fetch('/filler/task/' + taskId + '/status', {
            method: 'POST',
            headers: _fillerHeaders('application/x-www-form-urlencoded'),
            body: new URLSearchParams({status: newStatus, status_reason: statusReason})
        }).then(function(resp) {
            if (resp.ok) {
                refreshTaskList();
                fetch('/filler/task/' + taskId, {headers: _fillerHeaders()})
                    .then(function(r) { return r.text(); })
                    .then(function(html) {
                        var el = document.getElementById('fillerDetail');
                        if (el) { el.innerHTML = html; htmx.process(el); }
                    });
            }
        });
    }

    document.addEventListener('DOMContentLoaded', refreshTaskList);
    </script>
</body>
</html>
