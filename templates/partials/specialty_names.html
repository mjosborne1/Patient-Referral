{% if specialties %}
{% for s in specialties %}
<div class="dropdown-item specialty-option py-1 px-2"
     style="cursor: pointer;"
     onclick="selectSpecialty('{{ s.code }}', {{ s.display | tojson | forceescape }})">
    <div class="d-flex justify-content-between align-items-center">
        <span>{{ s.display }}</span>
        <small class="text-muted ms-2 text-nowrap">{{ s.code }}</small>
    </div>
</div>
{% endfor %}
{% else %}
<div class="dropdown-item-text text-muted small px-2 py-1">
    <i class="fas fa-info-circle me-1"></i> No matches found.
</div>
{% endif %}
